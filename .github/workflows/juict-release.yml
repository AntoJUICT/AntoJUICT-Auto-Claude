name: JUICT Release (Windows)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-frontend

      - name: Cache bundled Python
        uses: actions/cache@v5
        with:
          path: apps/frontend/python-runtime
          key: python-bundle-windows-x64-3.12.8-${{ hashFiles('apps/backend/requirements.txt') }}
          restore-keys: |
            python-bundle-windows-x64-3.12.8-

      - name: Set version from release tag
        if: github.event_name == 'release'
        run: |
          $tag = "${{ github.event.release.tag_name }}" -replace '^v', ''
          npm version $tag --no-git-tag-version --prefix apps/frontend

      - name: Build and publish Windows
        run: cd apps/frontend && npm run package:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
